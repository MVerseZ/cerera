version: "3.8"

# Запуск: docker compose -f deployments/docker-compose-public.yml up -d --build
# Сервисы доступны через nginx на http://91.199.32.125/
#   /            → Cerera Node API (порт 1337)
#   /grafana/    → Grafana
#   /prometheus/ → Prometheus

services:

  # ─── Cerera Node ────────────────────────────────────────────────────────────
  node1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: cerera-node1
    command: ["cerera", "--mode=p2p", "--http=1337", "--port=31100", "--mem=true", "--miner"]
    ports:
      - "127.0.0.1:1337:1337"  # HTTP/RPC — только localhost, системный nginx проксирует
      - "31100:31100"           # P2P — открыт напрямую для пиров
    volumes:
      - node1_data:/app/data
      - node1_config:/app/config
    restart: unless-stopped
    networks:
      - cerera-network

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cerera-prometheus
    depends_on:
      - node1
    volumes:
      - ./prometheus-single.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.external-url=http://91.199.32.125/prometheus/
      - --web.route-prefix=/
    ports:
      - "127.0.0.1:9090:9090"  # Только localhost
    restart: unless-stopped
    networks:
      - cerera-network

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cerera-grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"  # Только localhost
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://91.199.32.125/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - cerera-network


volumes:
  node1_data:
  node1_config:
  prom_data:
  grafana_data:

networks:
  cerera-network:
    driver: bridge
